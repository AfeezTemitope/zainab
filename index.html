<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #e8b86d;
    --rose: #f2a6a6;
    --blush: #fce4d8;
    --deep: #1a0a0a;
    --warm-white: #fff8f2;
    --glow: rgba(232, 184, 109, 0.35);
  }

  html, body {
    width: 100%; height: 100%;
    overflow-x: hidden;
    background: var(--deep);
    font-family: 'Lato', sans-serif;
  }

  /* ── CANVAS FOR PARTICLES ── */
  #canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(242,166,166,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(232,184,109,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 60%, rgba(242,166,166,0.10) 0%, transparent 60%),
      #1a0a0a;
    z-index: 0;
  }

  /* ── MAIN WRAPPER ── */
  .scene {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 80px;
    text-align: center;
  }

  /* ── CANDLE / FLAME ── */
  .candle-wrap {
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .candle {
    width: 18px;
    height: 60px;
    background: linear-gradient(to bottom, #f9e4c8, #e8b86d);
    border-radius: 3px 3px 2px 2px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 18px 4px rgba(232,184,109,0.3);
  }

  .wick {
    width: 2px;
    height: 8px;
    background: #4a2a0a;
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 2px;
  }

  .flame {
    width: 14px;
    height: 22px;
    background: radial-gradient(ellipse at 50% 70%, #fff7a1 0%, #ffcc44 40%, #ff6a00 80%, transparent 100%);
    border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    animation: flicker 1.4s ease-in-out infinite alternate;
    filter: blur(0.5px);
  }

  .flame-glow {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,80,0.55) 0%, transparent 70%);
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    animation: glowPulse 1.4s ease-in-out infinite alternate;
  }

  @keyframes flicker {
    0%   { transform: translateX(-50%) scaleX(1)   scaleY(1)   rotate(-2deg); }
    33%  { transform: translateX(-50%) scaleX(0.9) scaleY(1.05) rotate(1deg); }
    66%  { transform: translateX(-50%) scaleX(1.05) scaleY(0.97) rotate(-1deg); }
    100% { transform: translateX(-50%) scaleX(0.95) scaleY(1.08) rotate(2deg); }
  }

  @keyframes glowPulse {
    from { opacity: 0.7; transform: translateX(-50%) scale(1); }
    to   { opacity: 1;   transform: translateX(-50%) scale(1.3); }
  }

  /* ── HBD TEXT ── */
  .hbd-label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: clamp(11px, 2vw, 13px);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.9s forwards;
    margin-bottom: 14px;
  }

  /* ── NAME ── */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 12vw, 96px);
    font-weight: 700;
    color: var(--warm-white);
    line-height: 1.05;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
    position: relative;
  }

  .name span {
    background: linear-gradient(135deg, #fff8f2 0%, #e8b86d 50%, #f2a6a6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(232,184,109,0.5));
  }

  /* ── DIVIDER ── */
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 24px auto;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  /* ── WISH TEXT ── */
  .wish {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(17px, 3.5vw, 24px);
    color: var(--blush);
    max-width: 560px;
    line-height: 1.75;
    opacity: 0;
    animation: fadeUp 1s ease 1.8s forwards;
    margin-bottom: 36px;
  }

  /* ── FROM ── */
  .from-line {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(232,184,109,0.65);
    opacity: 0;
    animation: fadeIn 1s ease 2.4s forwards;
    margin-bottom: 48px;
  }

  /* ── CTA BUTTON ── */
  .cta-btn {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--deep);
    background: linear-gradient(135deg, #e8b86d, #f2a6a6);
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 28px rgba(232,184,109,0.4), 0 0 60px rgba(232,184,109,0.15);
    opacity: 0;
    animation: fadeUp 1s ease 2.7s forwards;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .cta-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 40px rgba(232,184,109,0.6), 0 0 80px rgba(232,184,109,0.2);
  }

  /* ── POP MESSAGE (after click) ── */
  .pop-msg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .pop-inner {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 7vw, 56px);
    color: var(--warm-white);
    text-shadow: 0 0 30px rgba(232,184,109,0.8);
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }

  .pop-inner.show {
    opacity: 1;
    transform: scale(1);
  }

  .pop-inner.hide {
    opacity: 0;
    transform: scale(1.2);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  /* ── FLOATING PETALS ── */
  .petal {
    position: fixed;
    font-size: 18px;
    pointer-events: none;
    opacity: 0;
    animation: petalFall linear forwards;
    z-index: 2;
  }

  @keyframes petalFall {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* ── SHARED KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── GLOW ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat ease-in-out infinite alternate;
  }

  .orb-1 {
    width: 340px; height: 340px;
    background: rgba(232,184,109,0.1);
    top: -100px; right: -80px;
    animation-duration: 7s;
  }

  .orb-2 {
    width: 280px; height: 280px;
    background: rgba(242,166,166,0.10);
    bottom: -60px; left: -60px;
    animation-duration: 9s;
  }

  @keyframes orbFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(20px, 20px) scale(1.1); }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="canvas"></canvas>

<div class="scene">

  <div class="candle-wrap">
    <div class="candle">
      <div class="wick"></div>
      <div class="flame-glow"></div>
      <div class="flame"></div>
    </div>
  </div>

  <p class="hbd-label">Happy Birthday</p>

  <h1 class="name"><span>Sainabuuuuuuu</span></h1>

  <div class="divider"></div>

  <p class="wish">
    On this beautiful day, I just want you to know how much you mean to me.
    Your laughter lights up every room, your kindness touches every heart.
    May this year bring you every joy you deserve — and so much more. 🌸
  </p>

  <p class="from-line">With all my love &nbsp;·&nbsp; Bello</p>

  <button class="cta-btn" onclick="celebrate()">🎉 Celebrate!</button>

</div>

<div class="pop-msg" id="popMsg">
  <div class="pop-inner" id="popInner">🎂 Wishing you the world! 🎂</div>
</div>

<script>
  /* ── SPARKLE PARTICLES ── */
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(min, max) { return Math.random() * (max - min) + min; }

  class Particle {
    constructor(burst) {
      this.reset(burst);
    }
    reset(burst) {
      if (burst) {
        this.x = burst.x;
        this.y = burst.y;
        const angle = rand(0, Math.PI * 2);
        const speed = rand(2, 8);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - rand(1, 3);
        this.alpha = 1;
        this.decay = rand(0.012, 0.025);
        this.size  = rand(3, 7);
        this.color = `hsl(${rand(20,45)}, 90%, ${rand(65,85)}%)`;
        this.gravity = 0.12;
      } else {
        this.x = rand(0, W);
        this.y = rand(0, H);
        const angle = rand(0, Math.PI * 2);
        const speed = rand(0.2, 0.7);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = rand(0.1, 0.6);
        this.decay = rand(0.001, 0.003);
        this.size  = rand(1, 2.5);
        this.color = Math.random() > 0.5
          ? `hsl(${rand(25,45)}, 80%, 75%)`
          : `hsl(${rand(340,360)}, 60%, 80%)`;
        this.gravity = 0;
        this.ambient = true;
      }
    }
    update() {
      this.x += this.vx;
      this.vy += this.gravity;
      this.y += this.vy;
      this.alpha -= this.decay;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle   = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur  = this.size * 3;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  // seed ambient sparkles
  for (let i = 0; i < 80; i++) particles.push(new Particle(false));

  function loop() {
    ctx.clearRect(0, 0, W, H);
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].dead) {
        if (particles[i].ambient) particles[i].reset(false);
        else particles.splice(i, 1);
      }
    }
    requestAnimationFrame(loop);
  }
  loop();

  /* ── CELEBRATE CLICK ── */
  function celebrate() {
    // burst particles
    const cx = W / 2, cy = H / 2;
    for (let i = 0; i < 160; i++) {
      const p = new Particle({ x: rand(cx - 60, cx + 60), y: rand(cy - 80, cy + 40) });
      particles.push(p);
    }

    // rain petals/emojis
    const emojis = ['🌸','✨','🎈','🎉','💛','🌟','🎀','💖'];
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const el = document.createElement('span');
        el.className = 'petal';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = rand(0, 100) + 'vw';
        el.style.fontSize = rand(14, 28) + 'px';
        const dur = rand(3.5, 7);
        el.style.animationDuration = dur + 's';
        el.style.animationDelay = rand(0, 1.5) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur + 2) * 1000);
      }, i * 60);
    }

    // pop message
    const inner = document.getElementById('popInner');
    const msg   = document.getElementById('popMsg');
    msg.style.pointerEvents = 'auto';
    inner.classList.add('show');
    setTimeout(() => {
      inner.classList.replace('show', 'hide');
      setTimeout(() => {
        inner.classList.remove('hide');
        msg.style.pointerEvents = 'none';
      }, 600);
    }, 2200);
  }
</script>
</body>
</html>
